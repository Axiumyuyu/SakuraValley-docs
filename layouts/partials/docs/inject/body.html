<style>
spoiler {
    background-color: #4a4a4a; color: transparent; cursor: pointer;
    transition: all 0.3s ease; padding: 0 4px; border-radius: 4px; user-select: none;
    display: inline-block; 
}
spoiler:hover { background-color: rgba(74, 74, 74, 0.2); color: inherit; }
spoiler.revealed { background-color: transparent; color: inherit; user-select: text; }
/* 演示模式的容器样式 */
.mm-demo-container {
    border: 1px solid #4a4a4a;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 1em;
    margin-bottom: 1em;
}
.mm-demo-preview {
    padding: 16px;
    background-color: rgba(0,0,0,0.2);
}
</style>

<script type="module">
import { MiniMessage } from 'https://esm.sh/minimessage-js';

document.addEventListener("DOMContentLoaded", () => {
    // 1. 原生 Spoiler 逻辑
    document.querySelectorAll('spoiler').forEach(el => {
        el.addEventListener('click', function() { this.classList.toggle('revealed'); });
    });

    const mini = MiniMessage.miniMessage();

    // 辅助函数：将原始字符串转化为解析后的 DOM 节点
    function createRenderedSpan(rawText) {
        const renderTarget = document.createElement('span');
        renderTarget.className = 'minimessage-rendered';
        try {
            mini.toHTML(mini.deserialize(rawText), renderTarget);
        } catch (e) {
            console.error("MiniMessage 解析失败:", rawText);
            renderTarget.textContent = rawText; // 降级处理
        }
        return renderTarget;
    }

    // 2. 模式：静默渲染 (替换自身)
    document.querySelectorAll('code.language-mm-render').forEach(codeBlock => {
        const rawText = codeBlock.textContent.trim();
        const preBlock = codeBlock.parentElement; // 获取外层的 <pre>
        // 用渲染结果彻底替换掉原有的代码块DOM
        preBlock.replaceWith(createRenderedSpan(rawText));
    });

    // 3. 模式：演示文档 (代码在上，效果在下)
    document.querySelectorAll('code.language-mm-demo').forEach(codeBlock => {
        const rawText = codeBlock.textContent.trim();
        const preBlock = codeBlock.parentElement;
        
        // 构建演示容器
        const container = document.createElement('div');
        container.className = 'mm-demo-container';

        // 构建下方的预览区
        const preview = document.createElement('div');
        preview.className = 'mm-demo-preview';
        preview.appendChild(createRenderedSpan(rawText));

        // 组装 DOM：将原来的代码块移入容器，并将预览区接在下方
        preBlock.parentNode.insertBefore(container, preBlock);
        container.appendChild(preBlock); 
        preBlock.style.margin = '0'; // 去除原代码块的边距以适应新容器
        preBlock.style.borderRadius = '0';
        
        container.appendChild(preview);
    });

    // 4. 行内代码处理 (对于句子中间的格式化)
    document.querySelectorAll('code').forEach(codeBlock => {
        const text = codeBlock.textContent;
        // 如果行内代码以 mm: 开头，则渲染并替换
        if (text.startsWith('mm:')) {
            const rawText = text.substring(3).trim();
            codeBlock.replaceWith(createRenderedSpan(rawText));
        }
    });
});
</script>

<style>
/* 直接将 spoiler 作为 CSS 选择器 */
spoiler {
    background-color: #4a4a4a;
    color: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0 4px;
    border-radius: 4px;
    user-select: none;
    /* 确保它在行内正常显示 */
    display: inline-block; 
}

/* 鼠标悬停时的预览效果 */
spoiler:hover {
    background-color: rgba(74, 74, 74, 0.2);
    color: inherit;
}

/* 点击后永久显示的样式 */
spoiler.revealed {
    background-color: transparent;
    color: inherit;
    user-select: text;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // 直接抓取页面上所有的裸 spoiler 标签
    document.querySelectorAll('spoiler').forEach(el => {
        el.addEventListener('click', function() {
            this.classList.toggle('revealed');
        });
    });
});
</script>
